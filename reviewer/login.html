<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>검수자 로그인 - IUMM</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
<style>
:root{
  --black:#0a0a0a;--white:#fafaf8;--gold:#c9a84c;--gold-light:#e8d5a3;
  --gray:#888;--border:rgba(201,168,76,0.15);
  --card-bg:rgba(255,255,255,0.03);--card-border:rgba(255,255,255,0.08);
  --red:#e05555;--green:#97c459;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;
  background:var(--black);color:var(--white);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
}
.container{width:100%;max-width:420px}
.brand{text-align:center;margin-bottom:40px}
.brand-logo{font-size:28px;font-weight:300;letter-spacing:3px;color:var(--gold);margin-bottom:8px}
.brand-sub{font-size:12px;color:var(--gray);letter-spacing:2px;text-transform:uppercase}
.card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:6px;padding:36px 32px;
}
.card-title{font-size:18px;font-weight:500;color:var(--white);margin-bottom:8px;text-align:center}
.card-desc{font-size:13px;color:var(--gray);text-align:center;margin-bottom:28px;line-height:1.6}
.btn-kakao{
  width:100%;padding:14px;font-size:15px;font-weight:600;
  background:#FEE500;color:#181600;border:none;border-radius:6px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity 0.15s;
  font-family:inherit;
}
.btn-kakao:hover{opacity:0.9}
.btn-kakao:disabled{opacity:0.5;cursor:not-allowed}
.btn-kakao svg{width:18px;height:18px}
.signup-hint{
  margin-top:20px;padding-top:20px;border-top:1px solid var(--border);
  text-align:center;font-size:12px;color:var(--gray);line-height:1.6;
}
.status-box{
  margin-top:20px;padding:14px 16px;border-radius:4px;font-size:13px;line-height:1.6;
  display:none;
}
.status-box.show{display:block}
.status-box.info{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.25);color:var(--gold-light)}
.status-box.error{background:rgba(224,85,85,0.08);border:1px solid rgba(224,85,85,0.3);color:var(--red)}
.status-box a{color:var(--gold);text-decoration:none;font-weight:500}
.status-box a:hover{text-decoration:underline}
.loading-spinner{
  display:inline-block;width:14px;height:14px;border:2px solid var(--gold);
  border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;
  margin-right:8px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{margin-top:24px;text-align:center;font-size:11px;color:var(--gray)}
.footer a{color:var(--gray);text-decoration:none;border-bottom:1px solid transparent}
.footer a:hover{border-color:var(--gray)}
</style>
</head>
<body>

<div class="container">

  <div class="brand">
    <div class="brand-logo">IUMM</div>
    <div class="brand-sub">Reviewer Portal</div>
  </div>

  <div class="card">
    <div class="card-title">검수자 로그인</div>
    <div class="card-desc">
      카카오 계정으로 안전하게 로그인합니다.
    </div>

    <button id="btn-kakao" class="btn-kakao" onclick="startKakaoLogin()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.48 2 10.8c0 2.77 1.85 5.2 4.6 6.55l-1.15 4.2c-.1.36.31.66.62.46l4.97-3.27c.31.04.62.06.96.06 5.52 0 10-3.48 10-7.8S17.52 3 12 3z"/></svg>
      <span id="btn-kakao-text">카카오로 로그인</span>
    </button>

    <div id="status" class="status-box"></div>

    <div class="signup-hint">
      처음이신가요? 카카오 로그인 후 자동으로 가입 신청 페이지로 안내됩니다.
    </div>
  </div>

  <div class="footer">
    <a href="/">← IUMM 메인으로</a>
  </div>

</div>

<script>
var SERVER_BASE = 'https://iumm-pipeline-production.up.railway.app';
var REDIRECT_URI = window.location.origin + '/reviewer/login';
var KAKAO_JS_KEY = 'd37fe286e0256c9199a29236ed10c244';

function showStatus(type, message){
  var box = document.getElementById('status');
  box.className = 'status-box show ' + type;
  box.innerHTML = message;
}

function setButtonLoading(loading){
  var btn = document.getElementById('btn-kakao');
  var txt = document.getElementById('btn-kakao-text');
  btn.disabled = loading;
  txt.textContent = loading ? '처리 중...' : '카카오로 로그인';
}

function startKakaoLogin(){
  if (typeof Kakao === 'undefined'){
    showStatus('error', '카카오 SDK를 불러오지 못했습니다. 새로고침 후 다시 시도해주세요.');
    return;
  }
  if (!Kakao.isInitialized()){
    try { Kakao.init(KAKAO_JS_KEY); }
    catch(e){ showStatus('error', '카카오 초기화 실패. 새로고침해주세요.'); return; }
  }
  Kakao.Auth.authorize({
    redirectUri: REDIRECT_URI,
    scope: 'profile_nickname,account_email'
  });
}

async function handleKakaoCallback(code){
  setButtonLoading(true);
  showStatus('info', '<span class="loading-spinner"></span>카카오 인증 확인 중...');
  try {
    var res = await fetch(SERVER_BASE + '/api/reviewer/kakao-callback', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ code: code, redirectUri: REDIRECT_URI })
    });
    var data = await res.json();

    if (!res.ok){
      showStatus('error', (data.error || '로그인에 실패했습니다.') + '<br><br><a href="/reviewer/login">다시 시도하기 →</a>');
      setButtonLoading(false);
      return;
    }

    if (data.status === 'unregistered'){
      localStorage.setItem('kakaoInfo', JSON.stringify({
        kakaoId: data.kakaoInfo.kakaoId,
        email:   data.kakaoInfo.email,
        name:    data.kakaoInfo.name,
        token:   data.kakaoInfo.token
      }));
      showStatus('info', '신규 검수자로 확인됐습니다. 가입 신청 페이지로 이동합니다.');
      setTimeout(function(){ location.href = '/reviewer/signup'; }, 800);
      return;
    }

    if (data.status === 'pending'){
      localStorage.setItem('reviewerToken', data.token);
      localStorage.setItem('pendingReviewerInfo', JSON.stringify(data.reviewer));
      showStatus('info', '가입 승인 대기 중입니다. 안내 페이지로 이동합니다.');
      setTimeout(function(){ location.href = '/reviewer/pending'; }, 800);
      return;
    }

    if (data.status === 'active'){
      localStorage.setItem('reviewerToken', data.token);
      showStatus('info', data.reviewer.name + '님 환영합니다. 대시보드로 이동합니다.');
      setTimeout(function(){ location.href = '/reviewer/'; }, 600);
      return;
    }

    showStatus('error', '알 수 없는 응답입니다.<br><br><a href="/reviewer/login">다시 시도하기 →</a>');
    setButtonLoading(false);
  } catch(err){
    console.error('카카오 콜백 처리 오류:', err);
    showStatus('error', '서버 연결에 실패했습니다.<br><br><a href="/reviewer/login">다시 시도하기 →</a>');
    setButtonLoading(false);
  }
}

(function init(){
  var existingToken = localStorage.getItem('reviewerToken');
  if (existingToken){
    location.href = '/reviewer/';
    return;
  }

  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var error = params.get('error');

  if (error){
    showStatus('error', '카카오 로그인이 취소됐거나 거부되었습니다.<br><br><a href="/reviewer/login">다시 시도하기 →</a>');
    history.replaceState(null, '', '/reviewer/login');
    return;
  }

  if (code){
    history.replaceState(null, '', '/reviewer/login');
    handleKakaoCallback(code);
    return;
  }
})();
</script>

</body>
</html>
