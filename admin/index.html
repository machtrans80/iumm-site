<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IUMM 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#0a0a0a;--white:#fafaf8;--gold:#c9a84c;--gold-light:#e8d5a3;
  --gray:#888;--border:rgba(201,168,76,0.15);--red:#e05555;--green:#97c459;
  --card-bg:rgba(255,255,255,0.03);--card-border:rgba(255,255,255,0.08);
}
html,body{height:100%;background:var(--black);color:var(--white);font-family:'Noto Sans KR',sans-serif;line-height:1.6}

/* ─ 로그인 ─ */
#login-view{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{width:100%;max-width:400px}
.login-logo{font-family:'Nanum Myeongjo',serif;font-size:32px;font-weight:800;color:var(--gold);letter-spacing:4px;text-align:center;margin-bottom:6px}
.login-logo span{color:var(--white)}
.login-sub{text-align:center;font-size:12px;color:rgba(201,168,76,0.6);letter-spacing:3px;margin-bottom:36px}
.login-form{background:var(--card-bg);border:1px solid var(--border);padding:32px;border-radius:4px}
.inp{width:100%;padding:14px 16px;background:#1a1a1a;border:1px solid rgba(255,255,255,0.12);border-radius:3px;color:var(--white);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:16px;transition:border-color 0.2s}
.inp:focus{border-color:rgba(201,168,76,0.5)}
.btn-login{width:100%;padding:14px;background:var(--gold);color:var(--black);border:none;border-radius:3px;cursor:pointer;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s}
.btn-login:hover{background:var(--gold-light)}
.err{font-size:13px;color:var(--red);margin-top:12px;text-align:center;min-height:20px}

/* ─ 대시보드 ─ */
#admin-view{display:none;flex-direction:column;min-height:100vh}
.admin-nav{background:rgba(10,10,10,0.96);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.admin-logo{font-family:'Nanum Myeongjo',serif;font-size:20px;font-weight:800;color:var(--gold);letter-spacing:3px}
.admin-logo span{color:var(--white)}
.btn-logout{background:none;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.45);padding:6px 14px;border-radius:2px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s}
.btn-logout:hover{border-color:rgba(224,85,85,0.4);color:rgba(224,85,85,0.8)}

.admin-body{flex:1;padding:28px;max-width:1100px;margin:0 auto;width:100%}

/* ─ 탭 ─ */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--card-border);margin-bottom:24px}
.tab-btn{padding:12px 28px;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,0.4);font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn:hover:not(.active){color:rgba(255,255,255,0.7)}

/* ─ 주문 테이블 ─ */
.orders-table{width:100%;border-collapse:collapse;font-size:13px}
.orders-table th{text-align:left;padding:10px 14px;border-bottom:1px solid var(--card-border);color:var(--gray);font-weight:400;font-size:11px;letter-spacing:0.5px}
.orders-table td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.75);vertical-align:middle}
.orders-table tr:hover td{background:rgba(255,255,255,0.02);cursor:pointer}
.orders-table tr.selected td{background:rgba(201,168,76,0.06);border-bottom-color:rgba(201,168,76,0.2)}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px}
.tag-pp{background:rgba(201,168,76,0.12);color:var(--gold)}
.tag-ap{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5)}
.empty-row td{text-align:center;color:var(--gray);padding:36px;font-weight:300}

/* ─ 컨펌 패널 ─ */
#confirm-panel{display:none;margin-top:24px;border:1px solid rgba(201,168,76,0.2);border-radius:4px;overflow:hidden}
.panel-header{background:rgba(201,168,76,0.06);padding:14px 20px;border-bottom:1px solid rgba(201,168,76,0.15);display:flex;justify-content:space-between;align-items:center}
.panel-title{font-size:14px;font-weight:500;color:var(--white)}
.panel-meta{font-size:12px;color:var(--gray)}
.panel-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.panel-pane{display:flex;flex-direction:column}
.panel-pane + .panel-pane{border-left:1px solid var(--card-border)}
.panel-pane-label{padding:10px 16px;border-bottom:1px solid var(--card-border);font-size:11px;color:var(--gray);letter-spacing:0.5px}
.panel-ta{width:100%;background:#0e0e0e;border:none;color:rgba(255,255,255,0.85);font-size:13px;font-family:'Noto Sans KR',sans-serif;line-height:1.8;padding:16px;resize:none;outline:none;min-height:280px}
.panel-ta.editable{color:var(--white)}
.panel-ta.editable:focus{background:#111}
.panel-footer{padding:16px 20px;border-top:1px solid var(--card-border);display:flex;justify-content:space-between;align-items:center}
.panel-info{font-size:13px;color:rgba(255,255,255,0.5)}
.panel-info strong{color:var(--white)}
.panel-info .amount{color:var(--gold);font-weight:700}
.btn-deliver{padding:12px 32px;background:var(--gold);color:var(--black);border:none;border-radius:3px;cursor:pointer;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s}
.btn-deliver:hover{background:var(--gold-light)}
.btn-deliver:disabled{opacity:0.4;cursor:not-allowed}

/* ─ 토스트 ─ */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);background:#1c1c1c;border:1px solid rgba(255,255,255,0.12);color:var(--white);padding:13px 28px;border-radius:4px;font-size:14px;z-index:600;transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(151,196,89,0.45);color:var(--green)}
.toast.error{border-color:rgba(224,85,85,0.45);color:var(--red)}

@media(max-width:768px){
  .panel-body{grid-template-columns:1fr}
  .admin-body{padding:16px}
}

/* ── 검수자 결과 섹션 ── */
#rv-info-section{border-top:1px solid var(--card-border);padding:14px 20px;display:flex;gap:20px;align-items:flex-start}
.rv-section-label{font-size:11px;color:var(--gold);letter-spacing:0.5px;font-weight:500;margin-bottom:7px;text-transform:uppercase}
.rv-comment-box{background:rgba(245,200,66,0.05);border:1px solid rgba(245,200,66,0.2);border-radius:4px;padding:11px 13px;font-size:13px;color:rgba(255,255,255,0.75);line-height:1.7;white-space:pre-wrap;min-height:48px}
.rv-cl-toggle-row{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0}
.rv-cl-toggle-row:hover .rv-section-label{color:var(--gold-light)}
.rv-cl-body{margin-top:8px;display:none;column-count:3;column-gap:10px}
.rv-cl-item{font-size:12px;padding:2px 0;line-height:1.5;break-inside:avoid}

/* ── 검수자 승인 탭 추가 스타일 ── */
.reviewers-table { width:100%; border-collapse:collapse; font-size:13px }
.reviewers-table th, .reviewers-table td { padding:10px 12px; text-align:left; border-bottom:1px solid var(--border) }
.reviewers-table thead th { background:rgba(201,168,76,0.08); color:var(--gold); font-weight:500; font-size:12px; letter-spacing:0.5px }
.reviewers-table tbody tr { cursor:pointer; transition:background 0.15s }
.reviewers-table tbody tr:hover { background:rgba(201,168,76,0.05) }
.reviewers-table tbody tr.selected { background:rgba(201,168,76,0.1) }
/* 모달 오버레이 */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; padding:20px; overflow-y:auto }
.modal-overlay.active { display:flex }
.modal-box { background:var(--black); border:1px solid var(--border); border-radius:8px; max-width:900px; width:100%; max-height:90vh; overflow-y:auto; color:var(--white) }
.modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center }
.modal-title { font-size:18px; font-weight:500; color:var(--gold) }
.modal-close { background:none; border:none; color:var(--gray); font-size:24px; cursor:pointer; padding:0; line-height:1 }
.modal-close:hover { color:var(--white) }
.modal-body { padding:20px 24px }
.modal-section { margin-bottom:20px }
.modal-section-title { font-size:12px; color:var(--gold); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; font-weight:500 }
.modal-row { display:flex; gap:12px; margin-bottom:6px; font-size:13px }
.modal-row .label { color:var(--gray); min-width:90px; flex-shrink:0 }
.modal-row .value { color:var(--white); flex:1; word-break:break-all }
.modal-tag { display:inline-block; padding:3px 10px; background:rgba(201,168,76,0.1); color:var(--gold); border-radius:10px; font-size:11px; margin-right:4px; margin-bottom:4px }
.modal-grade { display:flex; flex-direction:column; gap:8px; margin-top:8px }
.modal-grade label { display:flex; align-items:center; gap:8px; padding:10px 14px; background:rgba(255,255,255,0.03); border:1px solid var(--card-border); border-radius:6px; cursor:pointer; font-size:13px }
.modal-grade label:hover { background:rgba(201,168,76,0.05); border-color:rgba(201,168,76,0.3) }
.modal-grade label input[type="radio"] { accent-color:var(--gold) }
.modal-grade label.checked { background:rgba(201,168,76,0.08); border-color:var(--gold) }
.modal-cert-link { display:inline-block; padding:6px 12px; background:rgba(201,168,76,0.1); color:var(--gold); border-radius:4px; text-decoration:none; font-size:12px; margin-right:6px; margin-bottom:6px; border:1px solid rgba(201,168,76,0.2) }
.modal-cert-link:hover { background:rgba(201,168,76,0.18) }
.modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end }
.btn-approve { padding:10px 24px; background:var(--green); color:var(--black); border:none; border-radius:6px; font-weight:500; cursor:pointer; font-size:14px }
.btn-approve:hover { opacity:0.85 }
.btn-approve:disabled { opacity:0.4; cursor:not-allowed }
.btn-reject { padding:10px 24px; background:var(--red); color:var(--white); border:none; border-radius:6px; font-weight:500; cursor:pointer; font-size:14px }
.btn-reject:hover { opacity:0.85 }
.btn-reject:disabled { opacity:0.4; cursor:not-allowed }
.btn-dl{padding:7px 14px;background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.3);border-radius:3px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;white-space:nowrap}
.btn-dl:hover{background:rgba(201,168,76,0.2)}
.btn-ul{display:inline-block;padding:7px 14px;background:rgba(151,196,89,0.1);color:var(--green);border:1px solid rgba(151,196,89,0.3);border-radius:3px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;white-space:nowrap}
.btn-ul:hover{background:rgba(151,196,89,0.2)}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-view">
  <div class="login-box">
    <div class="login-logo">IU<span>MM</span></div>
    <div class="login-sub">ADMIN PANEL</div>
    <div class="login-form">
      <input type="password" class="inp" id="admin-pw" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')doAdminLogin()">
      <button class="btn-login" onclick="doAdminLogin()">로그인</button>
      <div class="err" id="login-err"></div>
    </div>
  </div>
</div>

<!-- 관리자 대시보드 -->
<div id="admin-view">
  <nav class="admin-nav">
    <div class="admin-logo">IU<span>MM</span> <span style="font-size:13px;color:rgba(255,255,255,0.3);font-weight:300;letter-spacing:1px">ADMIN</span></div>
    <button class="btn-logout" onclick="doAdminLogout()">로그아웃</button>
  </nav>
  <div class="admin-body">
    <div class="tabs">
      <button class="tab-btn active" id="tab-ai" onclick="switchTab('ai_premium')">AI 프리미엄 납품 대기</button>
      <button class="tab-btn" id="tab-pp" onclick="switchTab('premium_plus')">프리미엄 플러스 컨펌</button>
      <button class="tab-btn" id="tab-rv" onclick="switchTab('reviewers')">검수자 승인</button>
      <button class="tab-btn" id="tab-rv-approved" onclick="switchTab('reviewers_approved')">승인된 검수자</button>
      <button class="tab-btn" id="tab-rv-rejected" onclick="switchTab('reviewers_rejected')">반려된 검수자</button>
    </div>
    <div id="orders-wrap">
      <table class="orders-table">
        <thead><tr><th>주문번호</th><th>고객이메일</th><th>글자수</th><th>플랜</th><th>접수일</th><th>금액</th></tr></thead>
        <tbody id="orders-tbody"><tr class="empty-row"><td colspan="6">로딩 중…</td></tr></tbody>
      </table>
    </div>
    <div id="confirm-panel">
      <div class="panel-header">
        <span class="panel-title" id="panel-ordnum">—</span>
        <span class="panel-meta" id="panel-meta"></span>
      </div>
      <div class="panel-body">
        <div class="panel-pane">
          <div class="panel-pane-label">원문 (읽기 전용)</div>
          <textarea class="panel-ta" id="panel-source" readonly></textarea>
        </div>
        <div class="panel-pane">
          <div class="panel-pane-label">번역본 (수정 가능 후 납품)</div>
          <textarea class="panel-ta editable" id="panel-translation"></textarea>
        </div>
      </div>
      <!-- 검수자 결과: 코멘트 + 21항목 (프미플 탭에서만 표시) -->
      <div id="rv-info-section" style="display:none">
        <div style="flex:0 0 220px">
          <div class="rv-section-label">검수자 코멘트</div>
          <div class="rv-comment-box" id="rv-comment-text">코멘트 없음</div>
        </div>
        <div style="flex:1">
          <div class="rv-cl-toggle-row" onclick="toggleChecklist()">
            <span class="rv-section-label" style="margin-bottom:0">검수자 보증 21항목</span>
            <span id="rv-cl-summary" style="font-size:11px;color:var(--gray)"></span>
            <span id="cl-toggle-icon" style="font-size:11px;color:var(--gray);margin-left:auto">▶ 펼치기</span>
          </div>
          <div class="rv-cl-body" id="rv-checklist-body"></div>
        </div>
      </div>
      <div class="panel-footer">
        <div class="panel-info">
          고객: <strong id="panel-email">—</strong> &nbsp;·&nbsp;
          금액: <span class="amount" id="panel-amount">—</span>
        </div>
        <button class="btn-dl" id="btn-dl-original" style="display:none" onclick="downloadOriginal()">⬇ 고객 원본</button>
        <div id="pp-file-actions" style="display:none;gap:6px;align-items:center">
          <button class="btn-dl" onclick="downloadResult('txt')">⬇ .txt</button>
          <button class="btn-dl" onclick="downloadResult('docx')">⬇ .docx</button>
          <label class="btn-ul">
            <span id="upload-label-text">⬆ 파일 업로드</span>
            <input type="file" id="admin-upload-input" style="display:none" onchange="uploadFinalFile(this)">
          </label>
        </div>
        <button class="btn-deliver" id="btn-deliver" onclick="doDeliver()">최종 납품</button>
      </div>
    </div>

    <!-- 검수자 상세 모달 -->
    <div id="reviewer-modal" class="modal-overlay" onclick="if(event.target===this) closeReviewerModal()">
      <div class="modal-box">
        <div class="modal-header">
          <div class="modal-title" id="rmodal-title">검수자 상세</div>
          <button class="modal-close" onclick="closeReviewerModal()">×</button>
        </div>
        <div class="modal-body" id="rmodal-body">
          <!-- JS로 렌더링 -->
        </div>
        <div class="modal-footer" id="modal-footer">
          <button class="btn-reject" id="btn-reject" onclick="doReject()">거절</button>
          <button class="btn-approve" id="btn-approve" onclick="doApprove()">승인</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
var API_BASE = 'https://iumm-pipeline-production.up.railway.app';
var currentTab = 'ai_premium';
var selectedOrder = null;

var ADMIN_CHECKLIST = [
  "원문의 모든 내용이 빠짐없이 번역되었다",
  "추가되거나 창작된 내용이 없다",
  "전문 용어가 일관되게 사용되었다",
  "고유명사 표기가 정확하다",
  "숫자, 날짜, 단위가 정확하다",
  "맞춤법 오류가 없다",
  "띄어쓰기 오류가 없다",
  "문장부호 사용이 적절하다",
  "한국어 어순이 자연스럽다",
  "직역투 표현이 정리되었다",
  "수동태/능동태 사용이 적절하다",
  "경어체 또는 평어체가 일관된다",
  "문체와 어조가 원문과 일치한다",
  "문화적 맥락이 적절히 반영되었다",
  "중복 표현이 정리되었다",
  "단락 구조가 원문과 일치한다",
  "줄바꿈, 들여쓰기 등 서식이 유지되었다",
  "괄호, 따옴표 등 보조 부호가 정확하다",
  "전문 분야(법률/의학/기술 등) 표현을 검토하였다",
  "최종 가독성을 확인하였다",
  "전체 재검토를 마쳤다"
];

function adminToken() { return localStorage.getItem('adminToken') || ''; }
function adminFetch(path, opts) {
  return fetch(API_BASE + path, Object.assign({ headers: { 'Authorization': 'Bearer ' + adminToken(), 'Content-Type': 'application/json' } }, opts||{}))
    .then(function(r){ return r.json(); });
}
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast '+(type||'');
  void el.offsetWidth; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 3500);
}
function ymd(iso) {
  if (!iso) return '—';
  var d = new Date(iso); return (d.getMonth()+1)+'/'+d.getDate();
}

async function doAdminLogin() {
  var pw = document.getElementById('admin-pw').value;
  document.getElementById('login-err').textContent = '';
  if (!pw) { document.getElementById('login-err').textContent = '비밀번호를 입력하세요'; return; }
  try {
    var res = await fetch(API_BASE + '/api/admin/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret: pw })
    }).then(function(r){ return r.json(); });
    if (res.success) {
      localStorage.setItem('adminToken', res.token);
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('admin-view').style.display = 'flex';
      loadOrders();
    } else {
      document.getElementById('login-err').textContent = res.error || '로그인 실패';
    }
  } catch(e) { document.getElementById('login-err').textContent = '서버 연결 실패'; }
}

function doAdminLogout() {
  localStorage.removeItem('adminToken');
  location.reload();
}

function switchTab(tab) {
  currentTab = tab;
  selectedOrder = null;
  document.getElementById('confirm-panel').style.display = 'none';
  document.getElementById('tab-ai').className = 'tab-btn' + (tab==='ai_premium' ? ' active' : '');
  document.getElementById('tab-pp').className = 'tab-btn' + (tab==='premium_plus' ? ' active' : '');
  document.getElementById('tab-rv').className = 'tab-btn' + (tab==='reviewers' ? ' active' : '');
  document.getElementById('tab-rv-approved').className = 'tab-btn' + (tab==='reviewers_approved' ? ' active' : '');
  document.getElementById('tab-rv-rejected').className = 'tab-btn' + (tab==='reviewers_rejected' ? ' active' : '');
  if (tab === 'reviewers') {

function downloadOriginal() {
  if (!selectedOrder) return;
  var num = selectedOrder.orderNumber || selectedOrder.orderId;
  downloadWithAuth('/api/admin/download-original/' + selectedOrder.orderId, '원본_' + num);
}

async function downloadWithAuth(path, filename) {
  try {
    var r = await fetch(API_BASE + path, { headers: { 'Authorization': 'Bearer ' + adminToken() } });
    if (!r.ok) { showToast('⚠️ 다운로드 실패 (' + r.status + ')', 'error'); return; }
    var blob = await r.blob();
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  } catch(e) { showToast('⚠️ ' + e.message, 'error'); }
}

function downloadResult(format) {
  if (!selectedOrder) return;
  var num = selectedOrder.orderNumber || selectedOrder.orderId;
  downloadWithAuth('/api/admin/download/' + selectedOrder.orderId + '?format=' + format, '번역본_' + num + '.' + format);
}

async function uploadFinalFile(input) {
  if (!selectedOrder || !input.files[0]) return;
  var labelText = document.getElementById('upload-label-text');
  if (labelText) labelText.textContent = '업로드 중…';
  input.disabled = true;
  try {
    var fd = new FormData();
    fd.append('file', input.files[0]);
    var r = await fetch(API_BASE + '/api/admin/upload/' + selectedOrder.orderId, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + adminToken() },
      body: fd,
    });
    var res = await r.json();
    if (res.ok) showToast('✅ 파일 업로드 완료: ' + res.filename, 'success');
    else showToast('⚠️ ' + (res.error || '업로드 실패'), 'error');
  } catch(e) { showToast('⚠️ ' + e.message, 'error'); }
  finally {
    input.value = '';
    input.disabled = false;
    if (labelText) labelText.textContent = '⬆ 파일 업로드';
  }
}

async function doApprove() {
  var r = window._selectedReviewer;

  var selected = document.querySelector('input[name="grade"]:checked');
  var grade = selected ? selected.value : '전문 검수자';

  var btn = document.getElementById('btn-approve');
  var rbtn = document.getElementById('btn-reject');
  btn.disabled = true; rbtn.disabled = true; btn.textContent = '처리 중…';
  try {
    var res = await adminFetch('/api/admin/reviewers/' + r.id + '/approve', {
      method: 'POST',
      body: JSON.stringify({ 검수자등급: grade }),
    });
    if (!res.success) throw new Error(res.error || '승인 실패');
    alert('승인 완료');
    closeReviewerModal();
    loadReviewers();
  } catch(e) {
    alert('오류: ' + e.message);

    btn.disabled = false; rbtn.disabled = false; btn.textContent = '승인';
  }
}

  var wrap = document.getElementById('orders-wrap');
  wrap.innerHTML = '<table class="reviewers-table"><thead><tr><th>이름</th><th>신청등급</th><th>전문분야</th><th>검수언어</th><th>전화</th><th>신청일</th><th>재승인</th></tr></thead><tbody id="rv-tbody"><tr class="empty-row"><td colspan="7">로딩 중…</td></tr></tbody></table>';
  try {
    var res = await adminFetch('/api/admin/reviewers/rejected');
    if (!res.success) {
      document.getElementById('rv-tbody').innerHTML = '<tr class="empty-row"><td colspan="7">로드 실패: ' + (res.error||'') + '</td></tr>';
      return;
    }
    var reviewers = res.reviewers || [];
    window._rejectedReviewers = reviewers;
    if (!reviewers.length) {
      document.getElementById('rv-tbody').innerHTML = '<tr class="empty-row"><td colspan="7">반려된 검수자가 없습니다</td></tr>';
      return;
    }
    document.getElementById('rv-tbody').innerHTML = reviewers.map(function(r) {
      var exp = (r.expertise||[]).slice(0,2).join(', ') + ((r.expertise||[]).length > 2 ? ' 외' : '');
      var lng = (r.languages||[]).slice(0,2).join(', ') + ((r.languages||[]).length > 2 ? ' 외' : '');
      return '<tr onclick="selectReviewer(\''+r.id+'\',\'reviewers_rejected\')" data-id="'+r.id+'">' +
        '<td>' + (r.name||'—') + '</td>' +
        '<td>' + (r.grade||'—') + '</td>' +
        '<td>' + (exp||'—') + '</td>' +
        '<td>' + (lng||'—') + '</td>' +
        '<td>' + (r.phone||'—') + '</td>' +
        '<td>' + ymd(r.signupAt) + '</td>' +
        '<td><button onclick="event.stopPropagation();reapproveReviewer(\''+r.id+'\')" style="padding:4px 10px;background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.3);border-radius:3px;cursor:pointer;font-size:12px">재승인</button></td>' +
        '</tr>';
    }).join('');
  } catch(e) {
    var tb = document.getElementById('rv-tbody');
    if (tb) tb.innerHTML = '<tr class="empty-row"><td colspan="7">오류: ' + e.message + '</td></tr>';
  }
}

async function toggleAvailability(id, current) {
  if (!confirm('가용상태를 ' + (current ? '비활성' : '활성') + '으로 변경하시겠습니까?')) return;
  try {
    var res = await adminFetch('/api/admin/reviewers/' + id + '/availability', {
      method: 'POST',
      body: JSON.stringify({ available: !current }),
    });
    if (!res.ok && !res.success) throw new Error(res.error || '변경 실패');
    showToast((current ? '비활성' : '활성') + '으로 변경되었습니다', 'success');
    loadApprovedReviewers();
  } catch(e) {
    showToast('⚠️ ' + e.message, 'error');
  }
}

async function reapproveReviewer(id) {
  if (!confirm('이 검수자를 재승인하시겠습니까?\n알림이 발송됩니다.')) return;
  try {
    var res = await adminFetch('/api/admin/reviewers/' + id + '/reapprove', {
      method: 'POST',
      body: JSON.stringify({}),
    });
    if (!res.ok && !res.success) throw new Error(res.error || '재승인 실패');
    showToast('✅ 재승인 완료', 'success');
    closeReviewerModal();
    loadRejectedReviewers();
  } catch(e) {
    showToast('⚠️ ' + e.message, 'error');
  }
}

// 초기화
window.addEventListener('DOMContentLoaded', function() {
  var tok = localStorage.getItem('adminToken');
  if (tok) {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('admin-view').style.display = 'flex';
    loadOrders();
  }
});
</script>
